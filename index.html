 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiVentas - Tienda Online</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #f4ac11;
    --dark: #2b2b2b;
    --gray-bg: #f4f4f4;
    --text: #333;
    --footer-bg: #3a3a3a;
    --white: #fff;
  }

  body {
    font-family: 'Barlow', sans-serif;
    color: var(--text);
    background: var(--white);
  }

  a { text-decoration: none; color: inherit; }

  /* ─── TOP BAR ─── */
  .top-bar {
    background: var(--white);
    padding: 10px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid hsl(0, 73%, 94%);
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .logo span:first-child { background: var(--dark); color: var(--white); padding: 2px 8px; }
  .logo span:last-child  { background: var(--yellow); color: var(--dark);  padding: 2px 8px; }

  .search-bar {
    display: flex;
    border: 1px solid #f5e5e5;
    border-radius: 3px;
    overflow: hidden;
    width: 340px;
  }
  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    padding: 8px 14px;
    font-size: 14px;
    font-family: 'Barlow', sans-serif;
  }
  .search-bar button {
    background: var(--yellow);
    border: none;
    padding: 0 14px;
    cursor: pointer;
    font-size: 16px;
  }

  .service-info { text-align: right; font-size: 13px; }
  .service-info strong { display: block; font-size: 16px; font-weight: 700; }

  /* ─── NAV ─── */
  nav {
    background: var(--dark);
    display: flex;
    align-items: center;
    padding: 0 40px;
    gap: 0;
  }

  .nav-cat {
    background: var(--yellow);
    color: var(--dark);
    padding: 14px 20px;
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    white-space: nowrap;
  }

  .nav-links {
    display: flex;
    gap: 0;
    margin-left: 20px;
  }
  .nav-links a {
    color: var(--white);
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 500;
    transition: color .2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--yellow); }

  .nav-icons {
    margin-left: auto;
    display: flex;
    gap: 20px;
    color: var(--white);
    font-size: 20px;
  }
  .nav-icons span { cursor: pointer; position: relative; }
  .badge {
    position: absolute;
    top: -6px; right: -8px;
    background: var(--yellow);
    color: var(--dark);
    border-radius: 50%;
    width: 16px; height: 16px;
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
